<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earthquake Monitor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container py-4">

    <h1 class="text-center mb-4">Live Earthquake Monitor (USGS)</h1>

    <div class="d-flex flex-wrap gap-2 mb-4 justify-content-center">
        <button class="btn btn-primary btn-lg" onclick="refreshData()">
            Fetch Latest from USGS
        </button>
    </div>

    <div class="row mb-4 g-3">
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Filter by Magnitude</h5>
                    <div class="input-group">
                        <input type="number" id="minMag" class="form-control" value="2.0" step="0.1" min="0">
                        <button class="btn btn-success" onclick="filterByMagnitude()">Apply</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Earthquakes After</h5>
                    <input type="datetime-local" id="afterTime" class="form-control mb-2">
                    <button class="btn btn-success w-100" onclick="filterAfterTime()">Show After Time</button>
                </div>
            </div>
        </div>

        <div class="col-md-4 d-flex align-items-end">
            <button class="btn btn-outline-secondary w-100" onclick="loadAllEarthquakes()">
                Reset Filters
            </button>
        </div>
    </div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong id="resultCount">Earthquakes (0)</strong>
            <small class="text-muted">Last updated: <span id="lastUpdated">-</span></small>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0" id="earthquakeTable">
                    <thead class="table-dark">
                    <tr>
                        <th>Magnitude</th>
                        <th>Place</th>
                        <th>Time</th>
                        <th>Mag Type</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="text-center mt-4">
        <small class="text-muted">Spring Boot + Vanilla JS + Bootstrap</small>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>
</body>
</html>
